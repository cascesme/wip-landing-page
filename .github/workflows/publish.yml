name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump level"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - latest

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  compute-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.bump }}" = "latest" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName \
            --jq '[.[].tagName | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(split(".") | map(tonumber)) | last // ""' 2>/dev/null || echo "")

          if [ "$LATEST" = "latest" ]; then LATEST=""; fi
          if [ -z "$LATEST" ]; then
            case "${{ inputs.bump }}" in
              major) NEXT="1.0.0" ;;
              minor) NEXT="0.1.0" ;;
              patch) NEXT="0.0.1" ;;
            esac
          else
            if [[ ! "$LATEST" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "ERROR: latest tag '$LATEST' is not valid semver" >&2
              exit 1
            fi
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            case "${{ inputs.bump }}" in
              major) NEXT="$((MAJOR + 1)).0.0" ;;
              minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          echo "Computed next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: compute-version
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ needs.compute-version.outputs.tag }}
            type=raw,value=latest,enable=${{ needs.compute-version.outputs.tag != 'latest' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [compute-version, publish]
    if: needs.compute-version.outputs.tag != 'latest'
    permissions:
      contents: write

    env:
      TAG: ${{ needs.compute-version.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub release
        run: |
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          fi
